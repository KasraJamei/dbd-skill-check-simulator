name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "package.json"

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read package version
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check release tag
        id: check
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build-release:
    needs: prepare-release
    if: needs.prepare-release.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            name: linux
            bundles: appimage
          - platform: windows-latest
            name: windows
            bundles: nsis
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libgtk-3-dev \
            webkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: npm ci

      - name: Build desktop app
        uses: tauri-apps/tauri-action@v0
        with:
          args: --bundles ${{ matrix.bundles }}

      - name: Clean up and organize artifacts
        shell: bash
        run: |
          mkdir -p final-artifacts/
          if [ "${{ matrix.name }}" = "windows" ]; then
            cp src-tauri/target/release/bundle/nsis/*.exe final-artifacts/ || true
          else
            cp src-tauri/target/release/bundle/appimage/*.AppImage final-artifacts/ || true
          fi

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries-${{ matrix.name }}
          path: final-artifacts/
          if-no-files-found: error

  publish-release:
    needs:
      - prepare-release
      - build-release
    if: needs.prepare-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create version tag
        run: |
          if ! git rev-parse "${{ needs.prepare-release.outputs.tag }}" >/dev/null 2>&1; then
            git tag "${{ needs.prepare-release.outputs.tag }}"
            git push origin "${{ needs.prepare-release.outputs.tag }}"
          fi

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-binaries-*
          path: release-artifacts
          merge-multiple: true

      - name: Generate release notes
        run: |
          {
            echo "## DBD Skill Check Simulator ${{ needs.prepare-release.outputs.version }}"
            echo
            echo "Desktop builds generated from commit $GITHUB_SHA."
            echo
            git log -n 20 --pretty=format:"- %s" || true
          } > RELEASE_NOTES.md

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ needs.prepare-release.outputs.tag }}" release-artifacts/* \
            --title "DBD Skill Check Simulator ${{ needs.prepare-release.outputs.version }}" \
            --notes-file RELEASE_NOTES.md